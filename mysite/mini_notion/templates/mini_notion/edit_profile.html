{% extends "mini_notion/base.html" %}
{% load crispy_forms_tags %}

{% block title %}Edit Profile{% endblock %}

{% block content %}
<div class="page-wrapper"> <!-- ensure full height -->
    <div class="page-content"> <!-- grow to fill space -->
        <div class="row justify-content-center mt-4 mb-5"> <!-- add bottom margin -->
            <div class="col-md-6">
                <h2>Edit Profile</h2>

                {% if profile_form.instance.photo %}
                <div class="mb-3 text-center p-2 dark-photo-container rounded">
                    <img src="{{ profile_form.instance.photo.url }}" alt="Current photo" class="rounded-circle" width="100" height="100">
                </div>
                {% endif %}

                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <h5>User Info</h5>
                    {{ user_form|crispy }}

                    <h5 class="mt-3">Profile Info</h5>
                    {{ profile_form|crispy }}

                    <button type="submit" class="btn btn-success mt-2">Save</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
