{% extends "mini_notion/base.html" %}
{% load static %}

{% block title %}Settings{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Settings</h2>

    <!-- Notifications -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header">
            Notifications
        </div>
        <div class="card-body">
            <form method="post" action="{% url 'update_notifications' %}">
                {% csrf_token %}
                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" name="reminders" id="reminders"
                           {% if user.userprofile.reminders %}checked{% endif %}>
                    <label class="form-check-label" for="reminders">
                        Toggle reminders on/off
                    </label>
                </div>
                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" name="email_notifications" id="email_notifications"
                           {% if user.userprofile.email_notifications %}checked{% endif %}>
                    <label class="form-check-label" for="email_notifications">
                        Email notifications
                    </label>
                </div>
                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" name="in_app_notifications"
                           id="in_app_notifications"
                           {% if user.userprofile.in_app_notifications %}checked{% endif %}>
                    <label class="form-check-label" for="in_app_notifications">
                        In-app notifications
                    </label>
                </div>
                <button type="submit" class="btn btn-success mt-2">Save Notifications</button>
            </form>
        </div>
    </div>

    <!-- Preferences -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header">
            Preferences
        </div>
        <div class="card-body">
            <form method="post" action="{% url 'update_preferences' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="theme" class="form-label">Theme</label>
                    <select class="form-select" name="theme" id="theme">
                        <option value="light" {% if user.userprofile.theme == 'light' %}selected{% endif %}>Light</option>
                        <option value="dark" {% if user.userprofile.theme == 'dark' %}selected{% endif %}>Dark</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="default_view" class="form-label">Default Project View</label>
                    <select class="form-select" name="default_view" id="default_view">
                        <option value="list" {% if user.userprofile.default_view == 'list' %}selected{% endif %}>List</option>
                        <option value="grid" {% if user.userprofile.default_view == 'grid' %}selected{% endif %}>Grid</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="language" class="form-label">Language</label>
                    <select class="form-select" name="language" id="language">
                        <option value="en" {% if user.userprofile.language == 'en' %}selected{% endif %}>English</option>
                        <option value="lt" {% if user.userprofile.language == 'lt' %}selected{% endif %}>Lithuanian</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-success">Save Preferences</button>
            </form>
        </div>
    </div>

 <!-- Danger Button -->
<div class="mb-5 text-center">
    <form method="post" action="{% url 'deactivate_account' %}"
          onsubmit="return confirm('Are you sure you want to deactivate your account?');">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger-orange btn-lg">
            Deactivate Account
        </button>
    </form>
</div>
</div>

<!-- Theme Switch Script -->
<script>
    // Apply saved theme on page load
    const currentTheme = "{{ user.userprofile.theme }}";
    document.body.classList.add(currentTheme + "-theme");

    // Live switch on dropdown change
    document.getElementById('theme').addEventListener('change', function() {
        document.body.classList.remove('light-theme', 'dark-theme');
        document.body.classList.add(this.value + '-theme');
    });
</script>
{% endblock %}
