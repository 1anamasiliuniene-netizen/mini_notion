{% extends "mini_notion/base.html" %}

{% block title %}Check your email{% endblock %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm p-4 text-center">
        <h2 class="mb-3 text-success">Check your email</h2>
        <p>
          If an account exists with the email you provided, you will shortly receive
          an email with a link to reset your password.
        </p>
        <a href="{% url 'login' %}" class="btn btn-warning w-100 mt-3">Back to Login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
