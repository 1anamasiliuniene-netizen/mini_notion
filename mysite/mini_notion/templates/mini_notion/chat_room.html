{% extends "mini_notion/base.html" %}
{% load static %}

{% block title %}Chat - {{ room_name }}{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8">

            <!-- Card wrapper -->
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    Chat Room: {{ room_name }}
                    <span class="badge bg-light text-dark" id="chat-badge">0 users</span>
                </div>
                <div class="card-body d-flex flex-column">

                    <!-- Chat messages -->
                    <textarea id="chat-messages" class="form-control mb-3 flex-grow-1" readonly
                              style="resize:none; height:300px;"></textarea>

                    <!-- Input field -->
                    <div class="input-group">
                        <input id="chat-message-input" type="text" class="form-control"
                               placeholder="Type a message and hit Enter...">
                        <button class="btn btn-primary" id="chat-send-btn" type="button">Send</button>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    const roomName = "{{ room_name }}";
    const chatSocket = new WebSocket(
        'ws://' + window.location.host + '/ws/chat/' + roomName + '/'
    );

    const messages = document.getElementById('chat-messages');
    const sendBtn = document.getElementById('chat-send-btn');

    chatSocket.onmessage = function(e) {
        const data = JSON.parse(e.data);
        messages.value += data.message + '\n';
        messages.scrollTop = messages.scrollHeight; // auto scroll
    };

    chatSocket.onclose = function(e) {
        console.error('Chat socket closed unexpectedly');
    };

    function sendMessage() {
        const input = document.getElementById('chat-message-input');
        const message = input.value.trim();
        if (message === '') return;
        chatSocket.send(JSON.stringify({'message': message}));
        input.value = '';
    }

    document.getElementById('chat-message-input').addEventListener('keyup', function(e) {
        if (e.key === 'Enter') sendMessage();
    });

    sendBtn.addEventListener('click', sendMessage);
</script>
{% endblock %}
