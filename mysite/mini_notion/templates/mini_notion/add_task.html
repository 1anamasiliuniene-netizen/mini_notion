{% extends "mini_notion/base.html" %}
{% load crispy_forms_tags %}

{% block title %}Add Task {% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Add Task to {{ project.title }}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-success">Save Task</button>
    </form>
</div>
{% endblock %}
