<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">

    <title>{% block title %}Mini Notion{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;600;700&display=swap"
          rel="stylesheet">

    <!-- Custom CSS -->
    <link href="{% static 'custom.css' %}" rel="stylesheet">

</head>
<body class="{% if request.user.is_authenticated and request.user.userprofile.theme == 'dark' %}dark-mode{% endif %}">
<div class="page-wrapper d-flex flex-column min-vh-100">

<style>
@media print {
    body * {
        visibility: visible; /* show everything */
        color-adjust: exact; /* maintain colors in print */
    }

    /* Hide buttons */
    button, .btn {
        display: none !important;
    }

    /* Remove absolute positioning */
    .card {
        position: static !important;
        width: auto !important;
        box-shadow: none !important;
    }

    /* Avoid splitting cards, table rows, list items */
    .card, .list-group-item, table, tr, td, th {
        page-break-inside: avoid;
    }

    /* Ensure major sections start nicely */
    h3, h4 {
        page-break-after: avoid;
        page-break-before: always;
    }

    /* Optional: force page break before tasks, comments, reminders */
    .tasks-section,
    .comments-section,
    .reminders-section {
        page-break-before: always;
    }
}
</style>

<!-- Hero Section -->
    <div class="hero-section w-100 py-4 mb-2">
        <div class="container d-flex flex-column">
            <h4 class="fw-bold mb-2" style="text-align: left;">&copy; mini Notion</h4>
            <p class="text-center fw-light fst-italic mb-0" style="font-size: 1.25rem;">{{ hero_phrase }}</p>
        </div>
    </div>

    <!-- Navbar -->
    {% include 'mini_notion/navbar.html' %}

    <!-- Main Content grows -->
    <div class="page-content flex-grow-1 container mt-4">
        {% block content %}{% endblock %}
    </div>

    <!-- Footer -->
    <footer class="mt-auto py-3 text-center bg-light dark-mode:bg-dark">
        <p>&copy; 2026 Mini Notion</p>
    </footer>

</div>

</body>
</html>
