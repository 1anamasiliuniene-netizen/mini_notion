<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mini Notion{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;600;700&display=swap"
          rel="stylesheet">

    <!-- Custom CSS -->
    <link href="{% static 'custom.css' %}" rel="stylesheet">
</head>
<body>

<!-- Hero Section -->
<div class="hero-section w-100 py-4 mb-2" style="background-color: #007399; color: white;">
    <div class="container d-flex flex-column">
        <!-- Brand on the left -->
        <h4 class="fw-bold mb-2" style="text-align: left;">&copy; mini Notion</h4>

        <!-- Hero / random phrase centered, light and italic -->
        <p class="text-center fw-light fst-italic mb-0" style="font-size: 1.25rem;">{{ hero_phrase }}</p>
    </div>
</div>

<!-- Navbar -->
{% include 'mini_notion/navbar.html' %}

<!-- Main Content -->
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<!-- Footer -->
<footer class="mt-5 p-4 text-secondary text-center" style="background-color: #ffdccc;">
    <p>&copy; 2026 Mini Notion</p>
</footer>

</body>
</html>

<!--Šis JavaScript kodas leidžia dinamiškai atnaujinti užduoties būseną naudojant AJAX POST užklausą per fetch API.
Taip išvengiama puslapio perkrovimo ir pagerinama vartotojo patirtis.
Taip pat naudojamas CSRF token saugumui užtikrinti.-->

<script>
document.addEventListener('DOMContentLoaded', function () {
    const checkboxes = document.querySelectorAll('.todo-checkbox');

    checkboxes.forEach(checkbox => {
        checkbox.addEventListener('change', function () {
            const taskId = this.dataset.taskId;
            const completed = this.checked;

            fetch('/update-task-status/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')  // CSRF token helper below
                },
                body: JSON.stringify({ id: taskId, completed: completed })
            })
            .then(response => {
                if (!response.ok) throw new Error('Network error');
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    if (completed) {
                        // Disable the checkbox when task is marked completed
                        checkbox.disabled = true;
                    }
                } else {
                    alert('Error updating task');
                    checkbox.checked = !completed; // revert change
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Error updating task');
                checkbox.checked = !completed; // revert change
            });
        });
    });

    // Helper function to get CSRF token
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
});
</script>
